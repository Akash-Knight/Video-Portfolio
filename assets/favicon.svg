<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#06b6d4" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="230" fill="#08090c" stroke="url(#glow-grad)" stroke-width="12" filter="url(#subtle-glow)" />
  
  <!-- Centered Stylized Logo Monogram -->
  <text x="256" y="270" dominant-baseline="middle" text-anchor="middle" 
        font-family="'Outfit', 'Inter', system-ui, -apple-system, sans-serif" font-weight="800" font-size="140" fill="#ffffff" letter-spacing="-2">
    <tspan fill="url(#glow-grad)">&lt;</tspan>C<tspan fill="url(#glow-grad)">.</tspan>F<tspan fill="url(#glow-grad)">/&gt;</tspan>
  </text>
</svg>
